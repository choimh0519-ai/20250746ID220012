<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>내 홈페이지</title>
    <style>
        /* 간단한 디자인 스타일링 */
        body {
            font-family: 'Pretendard', sans-serif;
            line-height: 1.6;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            color: #333;
        }
        header {
            text-align: center;
            padding: 50px 0;
            border-bottom: 1px solid #eee;
        }
        main {
            padding: 20px 0;
        }
        .image-container {
            text-align: center;
            margin: 20px 0;
        }
        img {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        article {
            margin-bottom: 40px;
        }
        footer {
            text-align: center;
            font-size: 0.8em;
            color: #888;
            margin-top: 50px;
        }
    </style>
</head>
<body>

    <header>
        <h1>나의 첫 번째 웹사이트</h1>
        <p>반갑습니다! 깃허브 페이지로 만든 공간입니다.</p>
    </header>

    <main>
        <!-- 첫 번째 게시물 -->
        <article>
            <h2>오늘의 일기: 홈페이지 제작 시작</h2>
            <p>드디어 깃허브를 통해 나만의 웹 공간을 만들었습니다. HTML과 CSS를 활용해서 하나씩 채워나갈 예정입니다.</p>
            
            <div class="image-container">
                <!-- 'my-photo.jpg'를 본인이 올린 사진 파일 이름으로 바꾸세요 -->
                <img src="my-photo.jpg" alt="내가 올린 사진 설명">
                <p><em>사진 설명: 멋진 풍경 사진입니다.</em></p>
            </div>

            <p>사진 아래에도 추가적인 설명을 적을 수 있습니다. 엔지니어링 공부나 프로젝트 기록을 남기기에 좋겠네요.</p>
        </article>
    </main>

    <footer>
        <p>&copy; 2026 내 이름. All rights reserved.</p>
    </footer>

</body>
</html>
